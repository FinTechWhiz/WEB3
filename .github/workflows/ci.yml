name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          # No `cache: "npm"` — requires package-lock.json, not committed yet.
      # Using `npm install` (not `npm ci`) because no package-lock.json is
      # committed yet — it couldn't be generated in the sandbox that built
      # this repo (no network access). Run `npm install` once locally,
      # commit the resulting package-lock.json, then switch this to `npm ci`
      # for reproducible, faster CI installs.
      - run: npm install
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r requirements.txt
      - run: ruff check .
      - name: Run tests against ephemeral SQLite
        env:
          DATABASE_URL: "sqlite:///./ci-test.db"
          JWT_SECRET_KEY: "ci-only-not-a-real-secret"
        run: pytest -v --cov=app --cov-report=term-missing
